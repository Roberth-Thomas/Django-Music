{% load static %}

        <header class="cabecalho">
            <img src="{% static '/assets/logo/djangomusic.png' %}" width="200" />
            <div class="cabecalho__busca">
                <div class="busca__fundo">
                    <form action="{% url 'buscar' %}">
                        <input class="busca__input" type="text" name="buscar" placeholder="O que você procura?">
                        <button type="submit">
                            <img class="busca__icone" src="{% static '/assets/ícones/1x/lupa.png' %}" alt="ícone de search">
                        </button>
                    </form>
                </div>
            </div>
        </header>
